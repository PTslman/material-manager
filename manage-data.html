<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة البيانات - مدير المواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --primary-bg: #e8f5e9;
            --bg-page: #fef9e6;
            --bg-surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --success: #10b981;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
        }
        body {
            font-family: 'Inter', 'Tajawal', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-2xl);
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: var(--shadow-md);
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-bg);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .stat-card .stat-icon i { font-size: 1.5rem; color: var(--primary); }
        .stat-card .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-card .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        .card {
            background: var(--bg-surface);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--border-light);
            margin-bottom: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            padding: 18px 24px;
            background: linear-gradient(to right, var(--primary-bg), var(--bg-surface));
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .add-btn:hover { background: var(--primary-dark); transform: scale(1.02); }
        .card-body { padding: 20px 24px; }
        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-page);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-full);
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,0.2); }
        .items-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-page);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }
        .item-row:hover { transform: translateX(-4px); box-shadow: var(--shadow-sm); }
        .item-name { font-weight: 500; flex: 1; }
        .item-actions { display: flex; gap: 8px; }
        .edit-item, .delete-item {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .edit-item { background: var(--warning-bg); color: var(--warning); }
        .edit-item:hover { background: var(--warning); color: white; transform: scale(1.05); }
        .delete-item { background: var(--danger-bg); color: var(--danger); }
        .delete-item:hover { background: var(--danger); color: white; transform: scale(1.05); }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--bg-surface);
            width: 92%;
            max-width: 450px;
            border-radius: var(--radius-2xl);
            padding: 28px;
            animation: fadeSlideUp 0.2s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .modal-header h3 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .modal-field { margin-bottom: 20px; }
        .modal-field label { display: block; font-weight: 600; font-size: 0.7rem; margin-bottom: 8px; color: var(--text-secondary); }
        .modal-field input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-page);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-lg);
            font-family: inherit;
            font-size: 0.9rem;
        }
        .modal-field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,0.2); }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
        }
        .save-btn { background: var(--primary); color: white; border: none; }
        .save-btn:hover { background: var(--primary-dark); }
        .cancel-btn { background: var(--bg-page); border: 1.5px solid var(--border-light); color: var(--text-secondary); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 2001;
            animation: toastFadeUp 0.2s ease;
        }
        @keyframes toastFadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card-header { flex-direction: column; text-align: center; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-database"></i> إدارة البيانات</h1>
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i> العودة</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-number" id="importantCount">0</div><div class="stat-label">بهارات هامة</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-leaf"></i></div><div class="stat-number" id="spicesCount">0</div><div class="stat-label">بهارات اضافية</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-seedling"></i></div><div class="stat-number" id="extraCount">0</div><div class="stat-label">بذوريات وأعشاب</div></div>
        </div>
        <!-- البهارات الهامة -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-star"></i> البهارات الهامة</h2>
                <button class="add-btn" onclick="openModal('important')"><i class="fas fa-plus"></i> إضافة بهار</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchImportant" class="search-input" placeholder="🔍 بحث عن بهار...">
                <div id="importantList" class="items-list"></div>
            </div>
        </div>
        <!-- البهارات الاضافية -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-leaf"></i> البهارات الاضافية</h2>
                <button class="add-btn" onclick="openModal('spices')"><i class="fas fa-plus"></i> إضافة بهار</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchSpices" class="search-input" placeholder="🔍 بحث عن بهار...">
                <div id="spicesList" class="items-list"></div>
            </div>
        </div>
        <!-- البذوريات والأعشاب -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-seedling"></i> البذوريات والأعشاب</h2>
                <button class="add-btn" onclick="openModal('extra')"><i class="fas fa-plus"></i> إضافة منتج</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchExtra" class="search-input" placeholder="🔍 بحث عن منتج...">
                <div id="extraList" class="items-list"></div>
            </div>
        </div>
    </div>
    <!-- Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-plus"></i> إضافة عنصر</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-field"><label>الاسم</label><input type="text" id="itemName" placeholder="أدخل الاسم..."></div>
            <div class="modal-buttons"><button id="saveBtn" class="save-btn">حفظ</button><button onclick="closeModal()" class="cancel-btn">إلغاء</button></div>
        </div>
    </div>
    <script>
        // ==================== البيانات ====================
        let importantItems = [];
        let spicesExtraItems = [];
        let extraItems = [];
        let currentType = 'important';
        let editingIndex = null;
        // ==================== التحميل من localStorage ====================
        function loadData() {
            const savedImportant = localStorage.getItem('global_important_items');
            const savedSpices = localStorage.getItem('global_spices_items');
            const savedExtra = localStorage.getItem('global_extra_items');
            importantItems = savedImportant ? JSON.parse(savedImportant) : [
                "شطه حلوة", "شطة حدة", "بابريكا مدخنة", "فلفل اسود ناعم", "كزبرة ناعمة", "كزبرة حب",
                "قرفة خشنة عيدان", "قرفة سيجار", "كمون ناعم", "كمون حب", "كاكاو نخب اول", "كاكاو نخب ثاني",
                "كركم", "كريمة محلاية", "كبسة ناعمة", "كبسة خليجية", "كاري", "مندي", "زنجبيل خشن",
                "زنجبيل ناعم", "سمسم", "سماق ناعم", "شيش", "شاورما", "حبة البركة", "ثوم ناعم", "بصل ناعم",
                "ملح ليمون", "ملح صيني", "ماجي صفراء", "ماجي بيضاء", "مشكلة", "مشكلة بيضاء", "نشا مصري",
                "هيل ناعم", "هيل حب"
            ];
            spicesExtraItems = savedSpices ? JSON.parse(savedSpices) : [
                "عصفر", "توابل هندية حارة", "صفار الزعفران", "صفار البيض", "فلفل اسود حب", "فلفل ابيض ناعم",
                "فلافل", "فاهيتا", "قرنفل ناعم", "قرنفل حب", "قرفة ناعمة", "قلي", "كتشب", "كراوية", "كريسبي",
                "بطاطا", "بروستد", "زعتر اوريجانو", "بيتزا", "جوزة الطيب ناعمة", "جوزة الطيب حب", "حلبة حب",
                "حلبة ناعمة", "خل نكهة", "خميرة", "لحمة خاروف", "مكسيكي", "مشاوي", "مدخنة", "محاشي", "نشا درس",
                "يانسون ناعم", "سدر ناعم", "سمك", "سجق", "سحلب", "شبة ناعمة", "نوديلز اندومي"
            ];
            extraItems = savedExtra ? JSON.parse(savedExtra) : [
                "بذر دوار شمس ملكي", "بذر دوار شمس الشبح", "بذر اصفر ملكي", "بذر اسود ملكي", "بذر كوسا",
                "بذر ابيض عريض", "فستق مدخن", "فستق مملح", "ذرة الفوشار", "شوفان", "نعنع يابس", "نسكافية خشنة",
                "اشلميش", "لوز ني", "كاجو ني", "لوز بقشرو", "فستق ني", "لبان الدكر", "لومي", "لومي اسود", "كركدية",
                "زهرة الالماسة", "شمرا ناعمة", "شمرا حب", "زهورات مشكلة", "جوز امريكي", "تمر سري", "جوز هند خشن",
                "جوز هند ناعم", "بذور الشيا", "بذور الكتان", "بذور الرشاد", "رمان زركش"
            ];
        }
        // ==================== الحفظ والمزامنة ====================
        function saveData() {
            localStorage.setItem('global_important_items', JSON.stringify(importantItems));
            localStorage.setItem('global_spices_items', JSON.stringify(spicesExtraItems));
            localStorage.setItem('global_extra_items', JSON.stringify(extraItems));
            // مزامنة مع التطبيق الرئيسي
            if (window.opener && !window.opener.closed) {
                try { window.opener.postMessage({ type: 'SYNC_MATERIALS_DATA', important: importantItems, spices: spicesExtraItems, extra: extraItems }, '*'); } catch(e) {}
            }
            // تحديث الإحصائيات
            document.getElementById('importantCount').textContent = importantItems.length;
            document.getElementById('spicesCount').textContent = spicesExtraItems.length;
            document.getElementById('extraCount').textContent = extraItems.length;
        }
        // ==================== عرض القوائم ====================
        function renderList(type, searchTerm = '') {
            let items, containerId;
            if (type === 'important') { items = importantItems; containerId = 'importantList'; }
            else if (type === 'spices') { items = spicesExtraItems; containerId = 'spicesList'; }
            else { items = extraItems; containerId = 'extraList'; }
            const filtered = items.filter(item => item.toLowerCase().includes(searchTerm.toLowerCase()));
            const container = document.getElementById(containerId);
            if (!container) return;
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد بيانات</p></div>';
                return;
            }
            container.innerHTML = filtered.map((item, idx) => {
                const originalIndex = items.indexOf(item);
                return `<div class="item-row"><span class="item-name">${escapeHtml(item)}</span><div class="item-actions"><button class="edit-item" onclick="openEditModal('${type}', ${originalIndex})"><i class="fas fa-edit"></i></button><button class="delete-item" onclick="deleteItem('${type}', ${originalIndex})"><i class="fas fa-trash-alt"></i></button></div></div>`;
            }).join('');
        }
        function renderAll() {
            renderList('important', document.getElementById('searchImportant')?.value || '');
            renderList('spices', document.getElementById('searchSpices')?.value || '');
            renderList('extra', document.getElementById('searchExtra')?.value || '');
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        // ==================== العمليات ====================
        function addItem(type, name) {
            if (!name.trim()) { showToast('الرجاء إدخال اسم صحيح', 'error'); return false; }
            let items; if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesExtraItems;
            else items = extraItems;
            if (items.includes(name.trim())) { showToast('هذا العنصر موجود بالفعل!', 'error'); return false; }
            items.push(name.trim());
            saveData(); renderAll(); showToast(`✓ تمت إضافة "${name}" بنجاح`);
            return true;
        }
        function updateItem(type, index, newName) {
            if (!newName.trim()) { showToast('الرجاء إدخال اسم صحيح', 'error'); return false; }
            let items; if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesExtraItems;
            else items = extraItems;
            if (index < 0 || index >= items.length) return false;
            const oldName = items[index]; items[index] = newName.trim();
            saveData(); renderAll(); showToast(`✓ تم تعديل "${oldName}" إلى "${newName}"`);
            return true;
        }
        function deleteItem(type, index) {
            let items, typeName;
            if (type === 'important') { items = importantItems; typeName = 'البهار'; }
            else if (type === 'spices') { items = spicesExtraItems; typeName = 'البهار'; }
            else { items = extraItems; typeName = 'المنتج'; }
            if (index < 0 || index >= items.length) return;
            const deletedName = items[index];
            if (confirm(`هل أنت متأكد من حذف "${deletedName}"؟`)) {
                items.splice(index, 1);
                saveData(); renderAll(); showToast(`✓ تم حذف ${typeName} "${deletedName}" بنجاح`);
            }
        }
        // ==================== النوافذ المنبثقة ====================
        function openModal(type) { currentType = type; editingIndex = null; document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> إضافة عنصر'; document.getElementById('itemName').value = ''; document.getElementById('itemModal').classList.add('active'); }
        function openEditModal(type, index) { currentType = type; editingIndex = index; let items; if (type === 'important') items = importantItems; else if (type === 'spices') items = spicesExtraItems; else items = extraItems; document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل العنصر'; document.getElementById('itemName').value = items[index]; document.getElementById('itemModal').classList.add('active'); }
        function closeModal() { document.getElementById('itemModal').classList.remove('active'); editingIndex = null; }
        function saveModal() { const name = document.getElementById('itemName').value; if (editingIndex !== null) updateItem(currentType, editingIndex, name); else addItem(currentType, name); closeModal(); }
        function showToast(message, type = 'success') { const existing = document.querySelector('.toast'); if (existing) existing.remove(); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500); }
        // ==================== البحث ====================
        document.getElementById('searchImportant')?.addEventListener('input', (e) => renderList('important', e.target.value));
        document.getElementById('searchSpices')?.addEventListener('input', (e) => renderList('spices', e.target.value));
        document.getElementById('searchExtra')?.addEventListener('input', (e) => renderList('extra', e.target.value));
        document.getElementById('saveBtn')?.addEventListener('click', saveModal);
        document.getElementById('itemModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('itemModal')) closeModal(); });
        document.getElementById('itemName')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveModal(); });
        // ==================== التهيئة ====================
        loadData(); renderAll(); saveData();
    </script>
</body>
</html>
