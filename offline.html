<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | مدير المواد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #047857, #065f46);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .offline-card {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .offline-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .offline-icon i {
            font-size: 48px;
            color: #059669;
        }
        h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 12px;
        }
        p {
            color: #6b7280;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .retry-btn {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .offline-tip {
            background: #fef3c7;
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
        }
        .offline-tip i {
            color: #f59e0b;
            margin-left: 8px;
        }
        .offline-tip p {
            margin: 0;
            color: #92400e;
            font-size: 14px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .offline-icon {
            animation: pulse 2s infinite;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">
                <i class="fas fa-wifi-slash"></i>
            </div>
            <h1>⚠️ غير متصل بالإنترنت</h1>
            <p>لا يمكن الاتصال بالخادم حالياً.<br>سيتم مزامنة البيانات تلقائياً عند عودة الاتصال.</p>
            <button class="retry-btn" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> إعادة المحاولة
            </button>
            <div class="offline-tip">
                <i class="fas fa-lightbulb"></i>
                <p>💡 يمكنك استخدام التطبيق دون اتصال، سيتم حفظ التغييرات ومزامنتها لاحقاً</p>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('online', function() {
            location.reload();
        });
    </script>
</body>
</html>
