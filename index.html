<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="نظام متكامل لإدارة المخزون والبهارات مع مزامنة سحابية فورية">
    <title>مدير المواد الذكي | نظام إدارة المخزون</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="manifest" href="/material-manager/manifest.json">
    <link rel="apple-touch-icon" href="/material-manager/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="72x72" href="/material-manager/icons/icon-72x72.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/material-manager/icons/icon-96x96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/material-manager/icons/icon-128x128.png">
    <link rel="icon" type="image/png" sizes="144x144" href="/material-manager/icons/icon-144x144.png">
    <link rel="icon" type="image/png" sizes="152x152" href="/material-manager/icons/icon-152x152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/material-manager/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="384x384" href="/material-manager/icons/icon-384x384.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/material-manager/icons/icon-512x512.png">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="splashScreen" class="splash">
    <div class="splash-logo"><i class="fas fa-boxes"></i></div>
    <h2>مدير المواد</h2>
    <div class="splash-subtitle">نظام إدارة المخزون الذكي</div>
    <div class="splash-version">نسخة احترافية v9.0</div>
</div>

<div id="appContainer" class="app-main" style="display: none;">
    
    <!-- Hero Section -->
    <div class="hero">
        <h1>مدير المواد والمخزون</h1>
        <div class="badge-cloud"><i class="fas fa-cloud-upload-alt"></i> مزامنة فورية</div>
    </div>
    
    <!-- شريط البحث ضمن المواد الموجودة -->
    <div class="search-bar-container">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="globalSearchInput" class="global-search-input" placeholder="بحث في المواد الموجودة...">
            <button id="clearSearchBtn" class="clear-search-btn" style="display: none;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="search-filters" id="searchFilters" style="display: none;">
            <button class="filter-chip active" data-filter="all">الكل</button>
            <button class="filter-chip" data-filter="main">أساسيات</button>
            <button class="filter-chip" data-filter="spices_extra">بهارات اضافية</button>
            <button class="filter-chip" data-filter="roasted">المحمصة</button>
            <button class="filter-chip" data-filter="herbs">الأعشاب</button>
            <button class="filter-chip" data-filter="extra">مواد اضافية</button>
            <button class="filter-chip" data-filter="bags">أكياس</button>
            <button class="filter-chip" data-filter="tawsaya">توصيات</button>
        </div>
    </div>
    
    <!-- زر إضافة مادة جديد (أسفل البحث) -->
    <button id="mainAddBtn" class="main-add-btn"><i class="fas fa-plus-circle"></i> إضافة مادة جديدة</button>
    
    <!-- شريط المزامنة -->
    <div class="sync-bar">
        <button id="syncBtn" class="sync-main-btn"><i class="fas fa-sync-alt"></i> مزامنة البيانات</button>
    </div>
    
    <!-- شريط الأدوات - تصميم جديد واضح -->
    <div class="toolbar-modern">
        <div class="toolbar-group">
            <button id="themeToggle" class="tool-btn" title="الوضع الليلي">
                <i class="fas fa-moon"></i>
                <span>ليلي</span>
            </button>
            <button id="backupBtn" class="tool-btn" title="نسخ احتياطي">
                <i class="fas fa-download"></i>
                <span>نسخ</span>
            </button>
            <button id="restoreBtn" class="tool-btn" title="استعادة">
                <i class="fas fa-upload"></i>
                <span>استعادة</span>
            </button>
            <button id="installBtn" class="tool-btn install-btn" title="تثبيت التطبيق" style="display: none;">
                <i class="fas fa-download"></i>
                <span>تثبيت</span>
            </button>
            <button id="clearAllBtn" class="tool-btn danger-btn" title="مسح الكل">
                <i class="fas fa-trash-alt"></i>
                <span>مسح</span>
            </button>
        </div>
    </div>
    
    <!-- الأقسام (كروت سريعة) -->
    <div class="categories-container">
        <button class="category-card" data-category="main">
            <div class="category-icon"><i class="fas fa-star"></i></div>
            <div class="category-info"><h3 class="category-title">أساسيات</h3></div>
            <div class="category-count" id="count-main">0</div>
        </button>
        <button class="category-card" data-category="spices_extra">
            <div class="category-icon"><i class="fas fa-leaf"></i></div>
            <div class="category-info"><h3 class="category-title">بهارات اضافية</h3></div>
            <div class="category-count" id="count-spices_extra">0</div>
        </button>
        <button class="category-card" data-category="roasted">
            <div class="category-icon"><i class="fas fa-fire"></i></div>
            <div class="category-info"><h3 class="category-title">المحمصة</h3></div>
            <div class="category-count" id="count-roasted">0</div>
        </button>
        <button class="category-card" data-category="herbs">
            <div class="category-icon"><i class="fas fa-seedling"></i></div>
            <div class="category-info"><h3 class="category-title">الأعشاب</h3></div>
            <div class="category-count" id="count-herbs">0</div>
        </button>
        <button class="category-card" data-category="extra">
            <div class="category-icon"><i class="fas fa-plus-circle"></i></div>
            <div class="category-info"><h3 class="category-title">مواد اضافية</h3></div>
            <div class="category-count" id="count-extra">0</div>
        </button>
        <button class="category-card" data-category="bags">
            <div class="category-icon"><i class="fas fa-shopping-bag"></i></div>
            <div class="category-info"><h3 class="category-title">أكياس تعبئة</h3></div>
            <div class="category-count" id="count-bags">0</div>
        </button>
        <button class="category-card" data-category="tawsaya">
            <div class="category-icon"><i class="fas fa-gift"></i></div>
            <div class="category-info"><h3 class="category-title">توصيات</h3></div>
            <div class="category-count" id="count-tawsaya">0</div>
        </button>
    </div>
    
    <!-- حاوية الأقسام والعرض -->
    <div id="sectionsContainer"></div>
    
    <!-- إحصائيات الذكاء الاصطناعي -->
    <div class="ai-stats-section">
        <div class="ai-stats-header">
            <i class="fas fa-brain"></i>
            <h3>تحليل المخزون</h3>
            <div class="ai-badge">AI</div>
        </div>
        <div class="ai-stats-grid">
            <div class="ai-stat-card">
                <div class="ai-stat-icon"><i class="fas fa-cubes"></i></div>
                <div class="ai-stat-info">
                    <span class="ai-stat-label">إجمالي المواد</span>
                    <span class="ai-stat-value" id="totalMaterialsCount">0</span>
                </div>
            </div>
            <div class="ai-stat-card">
                <div class="ai-stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="ai-stat-info">
                    <span class="ai-stat-label">إجمالي الكمية</span>
                    <span class="ai-stat-value" id="totalQuantityValue">0</span>
                    <span class="ai-stat-unit">kg</span>
                </div>
            </div>
            <div class="ai-stat-card warning">
                <div class="ai-stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="ai-stat-info">
                    <span class="ai-stat-label">مواد ناقصة</span>
                    <span class="ai-stat-value" id="lowStockCount">0</span>
                </div>
            </div>
            <div class="ai-stat-card success">
                <div class="ai-stat-icon"><i class="fas fa-chart-pie"></i></div>
                <div class="ai-stat-info">
                    <span class="ai-stat-label">متوسط الكمية</span>
                    <span class="ai-stat-value" id="avgQuantityValue">0</span>
                    <span class="ai-stat-unit">kg</span>
                </div>
            </div>
        </div>
        <div class="ai-insights" id="aiInsights">
            <i class="fas fa-robot"></i>
            <span>جاري تحليل البيانات...</span>
        </div>
    </div>
</div>

<!-- شريط الحالة -->
<div id="syncStatusBar" class="sync-status-bar">
    <div class="sync-indicator">
        <div id="syncDot" class="sync-dot"></div>
        <span id="syncStatusText">جاري التحميل...</span>
    </div>
    <span id="syncItemsCount"><i class="fas fa-database"></i> 0</span>
</div>

<!-- ==================== MODALS ==================== -->

<!-- New Item Modal -->
<div id="newItemModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle"></i> إضافة مادة جديدة</h3>
        <div class="modern-field">
            <label>اسم المادة</label>
            <div class="field-container">
                <div class="field-icon"><i class="fas fa-tag"></i></div>
                <input type="text" id="newMaterialName" placeholder="مثال: فلفل أسود، كمون...">
            </div>
        </div>
        <div class="modern-field">
            <label>القسم</label>
            <div class="field-container">
                <div class="field-icon"><i class="fas fa-folder"></i></div>
                <select id="newMaterialSection">
                    <option value="main">أساسيات</option>
                    <option value="spices_extra">بهارات اضافية</option>
                    <option value="roasted">المحمصة</option>
                    <option value="herbs">الأعشاب</option>
                    <option value="extra">مواد اضافية</option>
                    <option value="bags">أكياس تعبئة</option>
                </select>
            </div>
        </div>
        <div class="modern-field">
            <label>الكمية</label>
            <div class="quantity-field-container">
                <select id="newUnitSelect" class="unit-select-input">
                    <option value="kg">كيلو (kg)</option>
                    <option value="half">نصف كيلو</option>
                    <option value="quarter">ربع كيلو</option>
                    <option value="oke">لوقية</option>
                    <option value="box">علبة</option>
                    <option value="piece">عدد</option>
                </select>
                <div class="qty-picker">
                    <button type="button" class="qty-dec-btn" id="newQtyDec">-</button>
                    <input type="number" id="newQuantityValue" class="qty-input" step="0.25" min="0" value="1">
                    <button type="button" class="qty-inc-btn" id="newQtyInc">+</button>
                </div>
            </div>
        </div>
        <div class="modal-buttons">
            <button id="saveNewItemBtn" class="btn-save">إضافة</button>
            <button id="closeNewModalBtn" class="btn-cancel">إلغاء</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> تعديل الكمية</h3>
        <div class="modern-field">
            <label>المادة</label>
            <div class="field-container"><input id="editMaterialName" readonly></div>
        </div>
        <div class="modern-field">
            <label>الكمية الجديدة</label>
            <div class="edit-quantity-field">
                <select id="editUnitSelect" class="unit-select-input">
                    <option value="kg">كيلو</option><option value="half">نصف كيلو</option>
                    <option value="quarter">ربع كيلو</option><option value="oke">لوقية</option>
                    <option value="box">علبة</option><option value="piece">عدد</option>
                </select>
                <input type="number" id="editQuantityValue" step="0.25">
            </div>
        </div>
        <div class="modal-buttons">
            <button id="saveEditBtn" class="btn-save">تحديث</button>
            <button id="closeEditModalBtn" class="btn-cancel">إلغاء</button>
        </div>
    </div>
</div>

<!-- Move Item Modal -->
<div id="moveItemModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-arrows-alt"></i> نقل المادة</h3>
        <div class="modern-field">
            <label>المادة</label>
            <div class="field-container"><input id="moveItemName" readonly></div>
        </div>
        <div class="modern-field">
            <label>نقل إلى</label>
            <div class="field-container">
                <select id="moveTargetSection">
                    <option value="main">أساسيات</option>
                    <option value="spices_extra">بهارات اضافية</option>
                    <option value="roasted">المحمصة</option>
                    <option value="herbs">الأعشاب</option>
                    <option value="extra">مواد اضافية</option>
                    <option value="bags">أكياس تعبئة</option>
                    <option value="tawsaya">توصيات</option>
                </select>
            </div>
        </div>
        <div class="modal-buttons">
            <button id="confirmMoveBtn" class="btn-save">نقل</button>
            <button id="cancelMoveBtn" class="btn-cancel">إلغاء</button>
        </div>
    </div>
</div>

<!-- System Message Modal -->
<div id="systemMessageModal" class="modal">
    <div class="modal-content" style="text-align:center">
        <i class="fas fa-info-circle" style="font-size:3rem;color:#10b981;margin-bottom:1rem"></i>
        <h3 id="systemMessageTitle">رسالة</h3>
        <p id="systemMessageText"></p>
        <button id="closeSystemMessageBtn" class="btn-save">حسناً</button>
    </div>
</div>

<!-- ==================== SCRIPTS ==================== -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/app.js"></script>

<script>
// إخفاء شاشة البداية بعد التحميل
setTimeout(function() {
    const splash = document.getElementById('splashScreen');
    const app = document.getElementById('appContainer');
    if (splash && app) {
        splash.classList.add('hidden');
        setTimeout(function() {
            splash.style.display = 'none';
            app.style.display = 'block';
        }, 500);
    }
}, 2000);
</script>
</body>
        </html>
