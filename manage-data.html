<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواد - مدير المواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --bg-page: #fef9e6;
            --bg-surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
        }
        body {
            font-family: 'Inter', 'Tajawal', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            color: white;
        }
        .header h1 { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-header {
            padding: 15px 20px;
            background: var(--bg-page);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h2 { display: flex; align-items: center; gap: 8px; color: var(--primary); font-size: 1.1rem; }
        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: var(--radius-full);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-family: inherit;
            margin-bottom: 15px;
        }
        .items-list { max-height: 350px; overflow-y: auto; }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-light);
        }
        .item-row:hover { background: var(--bg-page); }
        .item-name { flex: 1; }
        .item-actions { display: flex; gap: 8px; }
        .edit-btn, .delete-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
        }
        .edit-btn { background: var(--warning-bg); color: var(--warning); }
        .delete-btn { background: var(--danger-bg); color: var(--danger); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--bg-surface);
            width: 90%;
            max-width: 400px;
            border-radius: var(--radius-xl);
            padding: 25px;
        }
        .modal-content h3 { margin-bottom: 20px; color: var(--primary); }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-family: inherit;
            margin-bottom: 20px;
        }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: var(--radius-full); cursor: pointer; }
        .save-btn { background: var(--primary); color: white; border: none; }
        .cancel-btn { background: var(--bg-page); border: 1px solid var(--border-light); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-full);
            z-index: 1001;
        }
        .counter { font-size: 0.8rem; color: var(--text-secondary); margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-database"></i> إدارة المواد</h1>
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i> عودة</button>
        </div>

        <!-- بهارات هامة -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-star"></i> البهارات الهامة <span id="importantCounter" class="counter"></span></h2>
                <button class="add-btn" onclick="openAddModal('important')"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchImportant" class="search-input" placeholder="بحث...">
                <div id="importantList" class="items-list"></div>
            </div>
        </div>

        <!-- بهارات اضافية -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-leaf"></i> البهارات الاضافية <span id="spicesCounter" class="counter"></span></h2>
                <button class="add-btn" onclick="openAddModal('spices')"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchSpices" class="search-input" placeholder="بحث...">
                <div id="spicesList" class="items-list"></div>
            </div>
        </div>

        <!-- بذوريات -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-seedling"></i> البذوريات والأعشاب <span id="extraCounter" class="counter"></span></h2>
                <button class="add-btn" onclick="openAddModal('extra')"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <div class="card-body">
                <input type="text" id="searchExtra" class="search-input" placeholder="بحث...">
                <div id="extraList" class="items-list"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-plus"></i> إضافة عنصر</h3>
            <input type="text" id="itemName" placeholder="أدخل الاسم...">
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveItem()">حفظ</button>
                <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== مفاتيح التخزين ====================
        const STORAGE_KEYS = {
            IMPORTANT: 'material_important_items',
            SPICES: 'material_spices_items',
            EXTRA: 'material_extra_items'
        };

        // البيانات الافتراضية
        const DEFAULT_IMPORTANT = ["شطه حلوة", "شطة حدة", "بابريكا مدخنة", "فلفل اسود ناعم", "كزبرة ناعمة", "كزبرة حب", "قرفة خشنة عيدان", "قرفة سيجار", "كمون ناعم", "كمون حب", "كاكاو نخب اول", "كاكاو نخب ثاني", "كركم", "كريمة محلاية", "كبسة ناعمة", "كبسة خليجية", "كاري", "مندي", "زنجبيل خشن", "زنجبيل ناعم", "سمسم", "سماق ناعم", "شيش", "شاورما", "حبة البركة", "ثوم ناعم", "بصل ناعم", "ملح ليمون", "ملح صيني", "ماجي صفراء", "ماجي بيضاء", "مشكلة", "مشكلة بيضاء", "نشا مصري", "هيل ناعم", "هيل حب"];
        const DEFAULT_SPICES = ["عصفر", "توابل هندية حارة", "صفار الزعفران", "صفار البيض", "فلفل اسود حب", "فلفل ابيض ناعم", "فلافل", "فاهيتا", "قرنفل ناعم", "قرنفل حب", "قرفة ناعمة", "قلي", "كتشب", "كراوية", "كريسبي", "بطاطا", "بروستد", "زعتر اوريجانو", "بيتزا", "جوزة الطيب ناعمة", "جوزة الطيب حب", "حلبة حب", "حلبة ناعمة", "خل نكهة", "خميرة", "لحمة خاروف", "مكسيكي", "مشاوي", "مدخنة", "محاشي", "نشا درس", "يانسون ناعم", "سدر ناعم", "سمك", "سجق", "سحلب", "شبة ناعمة", "نوديلز اندومي"];
        const DEFAULT_EXTRA = ["بذر دوار شمس ملكي", "بذر دوار شمس الشبح", "بذر اصفر ملكي", "بذر اسود ملكي", "بذر كوسا", "بذر ابيض عريض", "فستق مدخن", "فستق مملح", "ذرة الفوشار", "شوفان", "نعنع يابس", "نسكافية خشنة", "اشلميش", "لوز ني", "كاجو ني", "لوز بقشرو", "فستق ني", "لبان الدكر", "لومي", "لومي اسود", "كركدية", "زهرة الالماسة", "شمرا ناعمة", "شمرا حب", "زهورات مشكلة", "جوز امريكي", "تمر سري", "جوز هند خشن", "جوز هند ناعم", "بذور الشيا", "بذور الكتان", "بذور الرشاد", "رمان زركش"];

        // ==================== تحميل البيانات ====================
        let importantItems = [], spicesItems = [], extraItems = [];
        let currentType = 'important';
        let editingIndex = null;

        function loadData() {
            importantItems = loadFromStorage(STORAGE_KEYS.IMPORTANT, DEFAULT_IMPORTANT);
            spicesItems = loadFromStorage(STORAGE_KEYS.SPICES, DEFAULT_SPICES);
            extraItems = loadFromStorage(STORAGE_KEYS.EXTRA, DEFAULT_EXTRA);
        }

        function loadFromStorage(key, defaultValue) {
            const saved = localStorage.getItem(key);
            if (saved && saved !== 'undefined') {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                } catch(e) {}
            }
            return [...defaultValue];
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEYS.IMPORTANT, JSON.stringify(importantItems));
            localStorage.setItem(STORAGE_KEYS.SPICES, JSON.stringify(spicesItems));
            localStorage.setItem(STORAGE_KEYS.EXTRA, JSON.stringify(extraItems));
            
            // تحديث العدادات
            document.getElementById('importantCounter').innerText = importantItems.length;
            document.getElementById('spicesCounter').innerText = spicesItems.length;
            document.getElementById('extraCounter').innerText = extraItems.length;
        }

        // ==================== العرض ====================
        function renderList(type, searchTerm = '') {
            let items, containerId;
            if (type === 'important') { items = importantItems; containerId = 'importantList'; }
            else if (type === 'spices') { items = spicesItems; containerId = 'spicesList'; }
            else { items = extraItems; containerId = 'extraList'; }
            
            const filtered = items.filter(i => i.toLowerCase().includes(searchTerm.toLowerCase()));
            const container = document.getElementById(containerId);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد بيانات</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((item, idx) => {
                const originalIndex = items.indexOf(item);
                return `
                    <div class="item-row">
                        <span class="item-name">${escapeHtml(item)}</span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="openEditModal('${type}', ${originalIndex})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteItem('${type}', ${originalIndex})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderList('important', document.getElementById('searchImportant')?.value || '');
            renderList('spices', document.getElementById('searchSpices')?.value || '');
            renderList('extra', document.getElementById('searchExtra')?.value || '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== العمليات ====================
        function addItem(type, name) {
            if (!name.trim()) { showToast('الرجاء إدخال اسم', 'error'); return false; }
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            if (items.includes(name.trim())) { showToast('العنصر موجود بالفعل', 'error'); return false; }
            
            items.push(name.trim());
            saveData();
            renderAll();
            showToast(`✓ تمت إضافة "${name}"`);
            return true;
        }

        function updateItem(type, index, newName) {
            if (!newName.trim()) { showToast('الرجاء إدخال اسم', 'error'); return false; }
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            if (index < 0 || index >= items.length) return false;
            const oldName = items[index];
            items[index] = newName.trim();
            saveData();
            renderAll();
            showToast(`✓ تم تعديل "${oldName}" إلى "${newName}"`);
            return true;
        }

        function deleteItem(type, index) {
            let items, typeName;
            if (type === 'important') { items = importantItems; typeName = 'بهار'; }
            else if (type === 'spices') { items = spicesItems; typeName = 'بهار'; }
            else { items = extraItems; typeName = 'منتج'; }
            
            if (index < 0 || index >= items.length) return;
            const deletedName = items[index];
            if (confirm(`هل أنت متأكد من حذف "${deletedName}"؟`)) {
                items.splice(index, 1);
                saveData();
                renderAll();
                showToast(`✓ تم حذف ${typeName} "${deletedName}"`);
            }
        }

        // ==================== النوافذ ====================
        function openAddModal(type) {
            currentType = type;
            editingIndex = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> إضافة عنصر';
            document.getElementById('itemName').value = '';
            document.getElementById('itemModal').classList.add('active');
        }

        function openEditModal(type, index) {
            currentType = type;
            editingIndex = index;
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل العنصر';
            document.getElementById('itemName').value = items[index];
            document.getElementById('itemModal').classList.add('active');
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            if (editingIndex !== null) updateItem(currentType, editingIndex, name);
            else addItem(currentType, name);
            closeModal();
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
            editingIndex = null;
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ==================== الأحداث ====================
        document.getElementById('searchImportant')?.addEventListener('input', (e) => renderList('important', e.target.value));
        document.getElementById('searchSpices')?.addEventListener('input', (e) => renderList('spices', e.target.value));
        document.getElementById('searchExtra')?.addEventListener('input', (e) => renderList('extra', e.target.value));
        document.getElementById('itemName')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveItem(); });
        document.getElementById('itemModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('itemModal')) closeModal(); });

        // ==================== التهيئة ====================
        loadData();
        saveData(); // لتحديث العدادات
        renderAll();
    </script>
</body>
</html>
