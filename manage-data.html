<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواد - مدير المواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: #fef9e6;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #2e7d32;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .items-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .item-row:hover {
            background: #fef9e6;
        }
        .item-name { flex: 1; font-weight: 500; }
        .item-actions { display: flex; gap: 8px; }
        .edit-btn, .delete-btn {
            background: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .edit-btn { color: #f59e0b; }
        .edit-btn:hover { background: #fef3c7; }
        .delete-btn { color: #ef4444; }
        .delete-btn:hover { background: #fee2e2; }
        .add-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            border-radius: 24px;
        }
        .modal-content h3 { margin-bottom: 20px; color: #2e7d32; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            margin: 15px 0;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .save-btn { background: #2e7d32; color: white; border: none; }
        .cancel-btn { background: #f3f4f6; border: 1px solid #e5e7eb; }
        .empty-state { text-align: center; padding: 40px; color: #9ca3af; }
        .counter {
            font-size: 0.8rem;
            background: #e8f5e9;
            padding: 2px 10px;
            border-radius: 40px;
            margin-right: 8px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-database"></i> إدارة المواد</h1>
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i> العودة للتطبيق</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-star"></i> البهارات الهامة <span id="importantCounter" class="counter"></span></h2>
        <input type="text" id="searchImportant" class="search-input" placeholder="🔍 بحث...">
        <div id="importantList" class="items-list"></div>
        <button class="add-btn" onclick="openModal('important')"><i class="fas fa-plus"></i> إضافة بهار جديد</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-leaf"></i> البهارات الاضافية <span id="spicesCounter" class="counter"></span></h2>
        <input type="text" id="searchSpices" class="search-input" placeholder="🔍 بحث...">
        <div id="spicesList" class="items-list"></div>
        <button class="add-btn" onclick="openModal('spices')"><i class="fas fa-plus"></i> إضافة بهار جديد</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-seedling"></i> البذوريات والأعشاب <span id="extraCounter" class="counter"></span></h2>
        <input type="text" id="searchExtra" class="search-input" placeholder="🔍 بحث...">
        <div id="extraList" class="items-list"></div>
        <button class="add-btn" onclick="openModal('extra')"><i class="fas fa-plus"></i> إضافة منتج جديد</button>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-plus"></i> إضافة عنصر</h3>
            <input type="text" id="itemName" placeholder="أدخل الاسم...">
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveItem()">حفظ</button>
                <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            IMPORTANT: 'material_important_items',
            SPICES: 'material_spices_items',
            EXTRA: 'material_extra_items'
        };

        const DEFAULT_IMPORTANT = [
            "شطه حلوة", "شطة حدة", "بابريكا مدخنة", "فلفل اسود ناعم", "كزبرة ناعمة", "كزبرة حب",
            "قرفة خشنة عيدان", "قرفة سيجار", "كمون ناعم", "كمون حب", "كاكاو نخب اول", "كاكاو نخب ثاني",
            "كركم", "كريمة محلاية", "كبسة ناعمة", "كبسة خليجية", "كاري", "مندي", "زنجبيل خشن",
            "زنجبيل ناعم", "سمسم", "سماق ناعم", "شيش", "شاورما", "حبة البركة", "ثوم ناعم", "بصل ناعم",
            "ملح ليمون", "ملح صيني", "ماجي صفراء", "ماجي بيضاء", "مشكلة", "مشكلة بيضاء", "نشا مصري", "هيل ناعم", "هيل حب"
        ];

        const DEFAULT_SPICES = [
            "عصفر", "توابل هندية حارة", "صفار الزعفران", "صفار البيض", "فلفل اسود حب", "فلفل ابيض ناعم",
            "فلافل", "فاهيتا", "قرنفل ناعم", "قرنفل حب", "قرفة ناعمة", "قلي", "كتشب", "كراوية", "كريسبي",
            "بطاطا", "بروستد", "زعتر اوريجانو", "بيتزا", "جوزة الطيب ناعمة", "جوزة الطيب حب", "حلبة حب",
            "حلبة ناعمة", "خل نكهة", "خميرة", "لحمة خاروف", "مكسيكي", "مشاوي", "مدخنة", "محاشي", "نشا درس",
            "يانسون ناعم", "سدر ناعم", "سمك", "سجق", "سحلب", "شبة ناعمة", "نوديلز اندومي"
        ];

        const DEFAULT_EXTRA = [
            "بذر دوار شمس ملكي", "بذر دوار شمس الشبح", "بذر اصفر ملكي", "بذر اسود ملكي", "بذر كوسا",
            "بذر ابيض عريض", "فستق مدخن", "فستق مملح", "ذرة الفوشار", "شوفان", "نعنع يابس", "نسكافية خشنة",
            "اشلميش", "لوز ني", "كاجو ني", "لوز بقشرو", "فستق ني", "لبان الدكر", "لومي", "لومي اسود", "كركدية",
            "زهرة الالماسة", "شمرا ناعمة", "شمرا حب", "زهورات مشكلة", "جوز امريكي", "تمر سري", "جوز هند خشن",
            "جوز هند ناعم", "بذور الشيا", "بذور الكتان", "بذور الرشاد", "رمان زركش"
        ];

        let importantItems = [], spicesItems = [], extraItems = [];
        let currentType = 'important';
        let editingIndex = null;

        function loadData() {
            importantItems = loadFromStorage(STORAGE_KEYS.IMPORTANT, DEFAULT_IMPORTANT);
            spicesItems = loadFromStorage(STORAGE_KEYS.SPICES, DEFAULT_SPICES);
            extraItems = loadFromStorage(STORAGE_KEYS.EXTRA, DEFAULT_EXTRA);
        }

        function loadFromStorage(key, defaultValue) {
            const saved = localStorage.getItem(key);
            if (saved && saved !== 'undefined') {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                } catch(e) {}
            }
            return [...defaultValue];
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEYS.IMPORTANT, JSON.stringify(importantItems));
            localStorage.setItem(STORAGE_KEYS.SPICES, JSON.stringify(spicesItems));
            localStorage.setItem(STORAGE_KEYS.EXTRA, JSON.stringify(extraItems));
            
            document.getElementById('importantCounter').innerText = importantItems.length;
            document.getElementById('spicesCounter').innerText = spicesItems.length;
            document.getElementById('extraCounter').innerText = extraItems.length;
            
            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage({
                        type: 'SYNC_MATERIALS_DATA',
                        important: importantItems,
                        spices: spicesItems,
                        extra: extraItems
                    }, '*');
                } catch(e) {}
            }
        }

        function renderList(type, searchTerm = '') {
            let items, containerId;
            if (type === 'important') { items = importantItems; containerId = 'importantList'; }
            else if (type === 'spices') { items = spicesItems; containerId = 'spicesList'; }
            else { items = extraItems; containerId = 'extraList'; }
            
            const filtered = items.filter(i => i.toLowerCase().includes(searchTerm.toLowerCase()));
            const container = document.getElementById(containerId);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد بيانات</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((item, idx) => {
                const originalIndex = items.indexOf(item);
                return `
                    <div class="item-row">
                        <span class="item-name">${escapeHtml(item)}</span>
                        <div class="item-actions">
                            <button class="edit-btn" onclick="openEditModal('${type}', ${originalIndex})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteItem('${type}', ${originalIndex})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderList('important', document.getElementById('searchImportant')?.value || '');
            renderList('spices', document.getElementById('searchSpices')?.value || '');
            renderList('extra', document.getElementById('searchExtra')?.value || '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addItem(type, name) {
            if (!name.trim()) { showMessage('الرجاء إدخال اسم صحيح', 'error'); return false; }
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            if (items.includes(name.trim())) { showMessage('هذا العنصر موجود بالفعل!', 'error'); return false; }
            
            items.push(name.trim());
            saveData();
            renderAll();
            showMessage(`✓ تمت إضافة "${name}"`);
            return true;
        }

        function updateItem(type, index, newName) {
            if (!newName.trim()) { showMessage('الرجاء إدخال اسم صحيح', 'error'); return false; }
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            if (index < 0 || index >= items.length) return false;
            const oldName = items[index];
            items[index] = newName.trim();
            saveData();
            renderAll();
            showMessage(`✓ تم تعديل "${oldName}" إلى "${newName}"`);
            return true;
        }

        function deleteItem(type, index) {
            let items, typeName;
            if (type === 'important') { items = importantItems; typeName = 'البهار'; }
            else if (type === 'spices') { items = spicesItems; typeName = 'البهار'; }
            else { items = extraItems; typeName = 'المنتج'; }
            
            if (index < 0 || index >= items.length) return;
            const deletedName = items[index];
            if (confirm(`هل أنت متأكد من حذف "${deletedName}"؟`)) {
                items.splice(index, 1);
                saveData();
                renderAll();
                showMessage(`✓ تم حذف ${typeName} "${deletedName}"`);
            }
        }

        function openModal(type) {
            currentType = type;
            editingIndex = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> إضافة عنصر جديد';
            document.getElementById('itemName').value = '';
            document.getElementById('itemModal').classList.add('active');
        }

        function openEditModal(type, index) {
            currentType = type;
            editingIndex = index;
            let items;
            if (type === 'important') items = importantItems;
            else if (type === 'spices') items = spicesItems;
            else items = extraItems;
            
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل العنصر';
            document.getElementById('itemName').value = items[index];
            document.getElementById('itemModal').classList.add('active');
        }

        function saveItem() {
            const name = document.getElementById('itemName').value;
            if (editingIndex !== null) updateItem(currentType, editingIndex, name);
            else addItem(currentType, name);
            closeModal();
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
            editingIndex = null;
        }

        function showMessage(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: ${type === 'error' ? '#dc2626' : '#2e7d32'}; color: white;
                padding: 10px 20px; border-radius: 40px; font-size: 0.85rem;
                z-index: 1001; font-weight: 600;
            `;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        document.getElementById('searchImportant')?.addEventListener('input', (e) => renderList('important', e.target.value));
        document.getElementById('searchSpices')?.addEventListener('input', (e) => renderList('spices', e.target.value));
        document.getElementById('searchExtra')?.addEventListener('input', (e) => renderList('extra', e.target.value));
        document.getElementById('itemModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('itemModal')) closeModal(); });
        document.getElementById('itemName')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveItem(); });

        loadData();
        saveData();
        renderAll();
    </script>
</body>
</html>
