<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>مدير المواد الذكي | نظام إدارة المخزون المتقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* ==================== RESET ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ==================== VARIABLES ==================== */
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --primary-bg: #e8f5e9;
            --bg-page: #fef9e6;
            --bg-surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-light: #e2e8f0;
            --border-medium: #cbd5e1;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --success: #10b981;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
        }
        
        /* ==================== DARK MODE ==================== */
        body.dark {
            --bg-page: #121826;
            --bg-surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
        }
        
        /* ==================== BASE ==================== */
        body {
            background: var(--bg-page);
            font-family: 'Inter', 'Tajawal', system-ui, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.2s;
        }
        
        /* ==================== SPLASH SCREEN ==================== */
        .splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .splash.hidden { opacity: 0; visibility: hidden; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .splash h2 { margin-top: 20px; font-size: 1.5rem; }
        .version-badge { margin-top: 12px; font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 4px 16px; border-radius: var(--radius-full); }
        
        /* ==================== APP MAIN ==================== */
        .app-main { max-width: 1400px; margin: 0 auto; padding: 16px; padding-bottom: 80px; display: none; }
        
        /* ==================== HERO ==================== */
        .hero { text-align: center; margin-bottom: 24px; }
        .hero h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-light)); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge-cloud { background: var(--primary-bg); display: inline-block; padding: 4px 16px; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 500; color: var(--primary); }
        
        /* ==================== MAIN BUTTON ==================== */
        .main-add-btn {
            display: block; width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 14px 20px; border-radius: var(--radius-full);
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; box-shadow: var(--shadow-md);
        }
        
        /* ==================== TOOLBAR ==================== */
        .toolbar { background: var(--bg-surface); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
        .toolbar-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .toolbar-row:last-child { margin-bottom: 0; }
        .action-btn {
            background: var(--primary-bg); border: 1px solid var(--border-light); padding: 8px 16px;
            border-radius: var(--radius-full); font-weight: 600; font-size: 0.8rem; cursor: pointer;
            color: var(--primary); transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.96); }
        
        /* ==================== MATERIALS GRID ==================== */
        .priority-section { margin-bottom: 32px; }
        .section-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--primary); border-right: 3px solid var(--primary); padding-right: 16px; margin-bottom: 20px; }
        .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .material-card { background: var(--bg-surface); border-radius: var(--radius-xl); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s; }
        .material-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-title { font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .edit-material, .delete-material { background: none; border: none; width: 32px; height: 32px; border-radius: var(--radius-full); cursor: pointer; color: var(--text-secondary); }
        .edit-material:hover, .delete-material:hover { background: var(--primary-bg); }
        .qty-badge { background: var(--primary-bg); padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 700; display: inline-block; color: var(--primary); }
        .empty-state { background: var(--bg-surface); text-align: center; padding: 40px; border-radius: var(--radius-xl); color: var(--text-secondary); border: 1px dashed var(--border-medium); }
        
        /* ==================== MODALS ==================== */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000;
            display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content, .confirm-card {
            background: var(--bg-surface); width: 92%; max-width: 520px;
            border-radius: var(--radius-2xl); padding: 24px; box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light); animation: fadeSlideUp 0.2s ease;
        }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-content h3 { margin-bottom: 20px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
        
        /* ==================== FORM FIELDS ==================== */
        .modern-field { margin-bottom: 20px; }
        .modern-field label { display: block; font-weight: 600; font-size: 0.7rem; margin-bottom: 6px; color: var(--text-secondary); }
        .field-container {
            display: flex; align-items: center; background: var(--bg-surface); border: 1.5px solid var(--border-light);
            border-radius: var(--radius-full); transition: all 0.2s;
        }
        .field-container:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,0.2); }
        .field-icon { padding: 0 16px; color: var(--text-secondary); }
        .field-container input, .field-container select { flex: 1; padding: 12px 0; background: transparent; border: none; font-size: 0.9rem; color: var(--text-primary); outline: none; }
        .quantity-unit { padding: 0 16px; color: var(--primary); font-weight: 700; background: var(--primary-bg); display: flex; align-items: center; border-radius: 0 var(--radius-full) var(--radius-full) 0; }
        
        /* ==================== UNITS BUTTONS ==================== */
        .units-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .unit-btn { background: var(--primary-bg); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .unit-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* ==================== QUANTITY PICKER ==================== */
        .qty-picker { display: flex; align-items: center; justify-content: center; gap: 16px; background: var(--bg-surface); border: 1.5px solid var(--border-light); border-radius: var(--radius-full); padding: 6px 16px; }
        .qty-picker button { background: var(--primary-bg); border: none; width: 40px; height: 40px; border-radius: var(--radius-full); font-size: 1.2rem; font-weight: bold; cursor: pointer; color: var(--primary); }
        .qty-picker input { width: 80px; text-align: center; font-size: 1.1rem; font-weight: 600; background: transparent; border: none; outline: none; }
        
        /* ==================== MODAL BUTTONS ==================== */
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 12px; border-radius: var(--radius-full); flex: 1; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: var(--primary-bg); border: 1px solid var(--border-light); padding: 12px; border-radius: var(--radius-full); flex: 1; cursor: pointer; font-weight: 600; }
        
        /* ==================== SEARCH ==================== */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { width: 100%; padding: 12px 20px 12px 48px; background: var(--bg-surface); border: 1.5px solid var(--border-light); border-radius: var(--radius-full); font-family: inherit; font-size: 0.9rem; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        body[dir="rtl"] .search-icon { left: auto; right: 18px; }
        
        /* ==================== MODERN CARD LIST ==================== */
        .modern-card-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; margin-bottom: 16px; }
        .modern-item-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 12px; border: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-info input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }
        .quantity-modern { display: flex; align-items: center; gap: 8px; background: var(--primary-bg); border-radius: var(--radius-full); padding: 4px 12px; }
        .qty-btn { background: white; border: none; width: 28px; height: 28px; border-radius: var(--radius-full); cursor: pointer; color: var(--primary); }
        .qty-value { width: 50px; text-align: center; font-weight: 600; background: transparent; border: none; }
        
        /* ==================== SYNC STATUS BAR ==================== */
        .sync-status-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface);
            border-top: 1px solid var(--border-light); padding: 8px 16px; display: flex;
            align-items: center; justify-content: space-between; font-size: 0.7rem; z-index: 101;
        }
        .sync-indicator { display: inline-flex; align-items: center; gap: 8px; background: var(--primary-bg); padding: 4px 12px; border-radius: var(--radius-full); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
        .sync-dot.offline { background: var(--danger); animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .retry-link { color: var(--primary); cursor: pointer; text-decoration: underline; }
        
        /* ==================== CONFIRM MODAL ==================== */
        .confirm-card { padding: 0; overflow: hidden; max-width: 400px; }
        .confirm-header { background: var(--danger); padding: 20px; text-align: center; color: white; }
        .confirm-header i { font-size: 2rem; margin-bottom: 8px; }
        .confirm-body { padding: 24px; text-align: center; }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-confirm { background: var(--danger); color: white; border: none; padding: 10px; border-radius: var(--radius-full); flex: 1; cursor: pointer; }
        
        /* ==================== TOAST ==================== */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: var(--radius-full); font-size: 0.8rem; z-index: 10001; font-weight: 600; animation: fadeUp 0.2s; }
        @keyframes fadeUp { from { opacity: 0; bottom: 80px; } to { opacity: 1; bottom: 100px; } }
        
        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .app-main { padding: 12px; }
            .materials-grid { grid-template-columns: 1fr; }
            .action-btn { padding: 6px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash">
        <div class="spinner"></div>
        <h2>مدير المواد</h2>
        <div class="version-badge">نسخة احترافية v4.0</div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="app-main">
        <div class="hero">
            <h1>مدير المواد والمخزون</h1>
            <div class="badge-cloud"><i class="fas fa-cloud-upload-alt"></i> مزامنة فورية + سحابي آمن</div>
        </div>
        
        <button id="mainAddBtn" class="main-add-btn"><i class="fas fa-plus-circle"></i> إضافة مادة جديدة</button>
        
        <div class="toolbar">
            <div class="toolbar-row">
                <button id="syncBtn" class="action-btn"><i class="fas fa-sync-alt"></i> مزامنة</button>
                <button id="themeToggle" class="action-btn"><i class="fas fa-moon"></i> الليلي</button>
            </div>
            <div class="toolbar-row">
                <button id="backupBtn" class="action-btn"><i class="fas fa-download"></i> نسخ احتياطي</button>
                <button id="restoreBtn" class="action-btn"><i class="fas fa-upload"></i> استعادة</button>
                <button id="installBtn" class="action-btn"><i class="fas fa-download"></i> تثبيت</button>
                <button id="updateBtn" class="action-btn"><i class="fas fa-sync-alt"></i> تحديث</button>
                <button id="refreshDataBtn" class="action-btn"><i class="fas fa-database"></i> تحديث البيانات</button>
                <button id="manageDataBtn" class="action-btn"><i class="fas fa-edit"></i> إدارة البيانات</button>
                <button id="manageUnitsBtn" class="action-btn"><i class="fas fa-ruler-combined"></i> إدارة الوحدات</button>
            </div>
            <div class="toolbar-row">
                <button id="importantProductsBtn" class="action-btn"><i class="fas fa-star"></i> بهارات هامة</button>
                <button id="spicesExtraBtn" class="action-btn"><i class="fas fa-leaf"></i> بهارات اضافية</button>
                <button id="quickProductsBtn" class="action-btn"><i class="fas fa-seedling"></i> بذوريات</button>
                <button id="bagsManagerBtn" class="action-btn"><i class="fas fa-shopping-bag"></i> أكياس</button>
                <button id="tawsayaQuickBtn" class="action-btn"><i class="fas fa-gift"></i> توصاية</button>
            </div>
        </div>
        
        <div id="materialsContainer"></div>
        
        <button id="clearAllBtn" class="main-add-btn" style="background: var(--danger);"><i class="fas fa-trash-alt"></i> مسح جميع المواد</button>
    </div>

    <!-- Sync Status Bar -->
    <div id="syncStatusBar" class="sync-status-bar">
        <div class="sync-indicator">
            <div id="syncDot" class="sync-dot"></div>
            <span id="syncStatusText">جاري الاتصال...</span>
        </div>
        <span id="syncRetry" class="retry-link" style="display:none"><i class="fas fa-sync-alt"></i> إعادة المحاولة</span>
        <span id="syncItemsCount"><i class="fas fa-database"></i> 0 عنصر</span>
    </div>

    <!-- Modals -->
    <div id="newItemModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-plus-circle"></i> إضافة مادة جديدة</h3>
            <div class="modern-field"><label>اسم المادة</label><div class="field-container"><div class="field-icon"><i class="fas fa-tag"></i></div><input type="text" id="newMaterialName" placeholder="مثال: فلفل أسود، كمون..."></div></div>
            <div class="modern-field"><label>الكمية (كيلوغرام)</label><div class="qty-picker"><button id="decrementQty">-</button><input type="number" id="newQuantityValue" step="0.25" value="1"><button id="incrementQty">+</button><span>kg</span></div></div>
            <div class="modal-buttons"><button id="saveNewItemBtn" class="btn-save">إضافة</button><button id="closeNewModalBtn" class="btn-cancel">إلغاء</button></div>
        </div>
    </div>

    <div id="importantModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-star"></i> بهارات هامة</h3>
            <div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" id="importantSearchInput" class="search-input" placeholder="ابحث..."></div>
            <div id="importantListContainer" class="modern-card-list"></div>
            <div class="modal-buttons"><button id="saveImportantBtn" class="btn-save">إضافة المحددة</button><button id="closeImportantModalBtn" class="btn-cancel">إلغاء</button></div>
        </div>
    </div>

    <div id="spicesExtraModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-leaf"></i> بهارات اضافية</h3>
            <div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" id="spicesExtraSearchInput" class="search-input" placeholder="ابحث..."></div>
            <div id="spicesExtraListContainer" class="modern-card-list"></div>
            <div class="modal-buttons"><button id="saveSpicesExtraBtn" class="btn-save">إضافة المحددة</button><button id="closeSpicesExtraModalBtn" class="btn-cancel">إلغاء</button></div>
        </div>
    </div>

    <div id="quickModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-seedling"></i> بذوريات واعشاب</h3>
            <div class="search-container"><i class="fas fa-search search-icon"></i><input type="text" id="quickSearchInput" class="search-input" placeholder="ابحث..."></div>
            <div id="quickListContainer" class="modern-card-list"></div>
            <div class="modal-buttons"><button id="saveQuickBtn" class="btn-save">إضافة</button><button id="closeQuickModalBtn" class="btn-cancel">إلغاء</button></div>
        </div>
    </div>

    <div id="bagsModal" class="modal">
        <div class="modal-content"><h3><i class="fas fa-bag-shopping"></i> أكياس التعبئة</h3><div id="bagsListContainer" class="modern-card-list"></div><div class="modal-buttons"><button id="saveBagsBtn" class="btn-save">إضافة</button><button id="closeBagsModalBtn" class="btn-cancel">إلغاء</button></div></div>
    </div>

    <div id="tawsayaModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-gift"></i> توصاية</h3>
            <div class="modern-field"><label>المنتج</label><div class="field-container"><div class="field-icon"><i class="fas fa-box"></i></div><input id="tawsayaName" placeholder="اسم المنتج..."></div></div>
            <div class="units-buttons" id="tawsayaTypeGroup"><button type="button" class="unit-btn active" data-type="kg">كيلو</button><button type="button" class="unit-btn" data-type="half">نصف كيلو</button><button type="button" class="unit-btn" data-type="custom">مخصص</button></div>
            <div id="tawsayaCustomQtyGroup" style="display:none"><div class="modern-field"><label>الكمية</label><div class="field-container"><div class="field-icon"><i class="fas fa-hashtag"></i></div><input type="number" id="tawsayaCustomQty" step="any" value="1"><div class="quantity-unit">kg</div></div></div></div>
            <div class="modal-buttons"><button id="saveTawsayaBtn" class="btn-save">إضافة</button><button id="closeTawsayaModalBtn" class="btn-cancel">إلغاء</button></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content"><h3><i class="fas fa-edit"></i> تعديل الكمية</h3><div class="modern-field"><label>المادة</label><div class="field-container"><div class="field-icon"><i class="fas fa-tag"></i></div><input id="editMaterialName" readonly></div></div><div class="modern-field"><label>الكمية الجديدة</label><div class="field-container"><div class="field-icon"><i class="fas fa-weight-hanging"></i></div><input type="number" id="editQuantityValue" step="0.25"><div class="quantity-unit">kg</div></div></div><div class="modal-buttons"><button id="saveEditBtn" class="btn-save">تحديث</button><button id="closeEditModalBtn" class="btn-cancel">إلغاء</button></div></div>
    </div>

    <div id="confirmDeleteModal" class="modal">
        <div class="confirm-card"><div class="confirm-header"><i class="fas fa-exclamation-triangle"></i><h3>تأكيد الحذف</h3></div><div class="confirm-body"><p id="confirmDeleteMessage">هل أنت متأكد من حذف هذه المادة؟</p><div class="confirm-buttons"><button id="confirmDeleteBtn" class="btn-confirm">نعم، احذف</button><button id="cancelDeleteBtn" class="btn-cancel">إلغاء</button></div></div></div>
    </div>

    <script>
        // ==================== البيانات الثابتة ====================
        let importantItemsList = [
            "شطه حلوة", "شطة حدة", "بابريكا مدخنة", "فلفل اسود ناعم", "كزبرة ناعمة", "كزبرة حب",
            "قرفة خشنة عيدان", "قرفة سيجار", "كمون ناعم", "كمون حب", "كاكاو نخب اول", "كاكاو نخب ثاني",
            "كركم", "كريمة محلاية", "كبسة ناعمة", "كبسة خليجية", "كاري", "مندي", "زنجبيل خشن",
            "زنجبيل ناعم", "سمسم", "سماق ناعم", "شيش", "شاورما", "حبة البركة", "ثوم ناعم", "بصل ناعم",
            "ملح ليمون", "ملح صيني", "ماجي صفراء", "ماجي بيضاء", "مشكلة", "مشكلة بيضاء", "نشا مصري", "هيل ناعم", "هيل حب"
        ];
        let spicesExtraItemsList = [
            "عصفر", "توابل هندية حارة", "صفار الزعفران", "صفار البيض", "فلفل اسود حب", "فلفل ابيض ناعم",
            "فلافل", "فاهيتا", "قرنفل ناعم", "قرنفل حب", "قرفة ناعمة", "قلي", "كتشب", "كراوية", "كريسبي",
            "بطاطا", "بروستد", "زعتر اوريجانو", "بيتزا", "جوزة الطيب ناعمة", "جوزة الطيب حب", "حلبة حب",
            "حلبة ناعمة", "خل نكهة", "خميرة", "لحمة خاروف", "مكسيكي", "مشاوي", "مدخنة", "محاشي", "نشا درس",
            "يانسون ناعم", "سدر ناعم", "سمك", "سجق", "سحلب", "شبة ناعمة", "نوديلز اندومي"
        ];
        let extraItemsList = [
            "بذر دوار شمس ملكي", "بذر دوار شمس الشبح", "بذر اصفر ملكي", "بذر اسود ملكي", "بذر كوسا",
            "بذر ابيض عريض", "فستق مدخن", "فستق مملح", "ذرة الفوشار", "شوفان", "نعنع يابس", "نسكافية خشنة",
            "اشلميش", "لوز ني", "كاجو ني", "لوز بقشرو", "فستق ني", "لبان الدكر", "لومي", "لومي اسود", "كركدية",
            "زهرة الالماسة", "شمرا ناعمة", "شمرا حب", "زهورات مشكلة", "جوز امريكي", "تمر سري", "جوز هند خشن",
            "جوز هند ناعم", "بذور الشيا", "بذور الكتان", "بذور الرشاد", "رمان زركش"
        ];
        let bagTypesList = ["شفاف 10×12","شفاف 20×12","شفاف 10×20","شفاف 25×17","شفاف 20×30","شفاف 35×25","صيدلية","أسود 30","أسود 35","أسود 40","أسود 45"];
        
        function getImportantItems() { return importantItemsList.map(n => ({ name: n, min: 1, max: 5 })); }
        function getSpicesExtraItems() { return spicesExtraItemsList.map(n => ({ name: n, min: 1, max: 10 })); }
        function getExtraItems() { return extraItemsList.map(n => ({ name: n, min: 1, max: 10 })); }
        
        // ==================== دوال العرض ====================
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function showToast(msg, isErr = false) { let t = document.querySelector('.toast'); if(t) t.remove(); let div = document.createElement('div'); div.className = 'toast'; div.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(div); setTimeout(() => div.remove(), 2500); }
        
        function renderImportantFiltered(filter = '') {
            const container = document.getElementById('importantListContainer');
            if (!container) return;
            const filtered = importantItemsList.filter(i => i.includes(filter));
            container.innerHTML = filtered.map((item, idx) => `<div class="modern-item-card"><div class="item-info"><input type="checkbox" id="imp_chk_${idx}"><span>${escapeHtml(item)}</span></div><div class="quantity-modern"><button class="qty-btn" data-idx="${idx}" data-dir="down">-</button><input type="number" id="imp_qty_${idx}" value="1" min="1" max="5" class="qty-value"><button class="qty-btn" data-idx="${idx}" data-dir="up">+</button><span>kg</span></div></div>`).join('');
            document.querySelectorAll('#importantListContainer .qty-btn').forEach(btn => {
                btn.onclick = (e) => { let idx = btn.dataset.idx; let inp = document.getElementById(`imp_qty_${idx}`); let val = parseInt(inp.value); if(btn.dataset.dir === 'up') val = Math.min(val+1,5); else val = Math.max(val-1,1); inp.value = val; };
            });
        }
        
        function renderSpicesExtraFiltered(filter = '') {
            const container = document.getElementById('spicesExtraListContainer');
            if (!container) return;
            const filtered = spicesExtraItemsList.filter(i => i.includes(filter));
            container.innerHTML = filtered.map((item, idx) => `<div class="modern-item-card"><div class="item-info"><input type="checkbox" id="sp_chk_${idx}"><span>${escapeHtml(item)}</span></div><div class="quantity-modern"><button class="qty-btn" data-idx="${idx}" data-dir="down">-</button><input type="number" id="sp_qty_${idx}" value="1" min="1" max="10" class="qty-value"><button class="qty-btn" data-idx="${idx}" data-dir="up">+</button><span>kg</span></div></div>`).join('');
            document.querySelectorAll('#spicesExtraListContainer .qty-btn').forEach(btn => {
                btn.onclick = (e) => { let idx = btn.dataset.idx; let inp = document.getElementById(`sp_qty_${idx}`); let val = parseInt(inp.value); if(btn.dataset.dir === 'up') val = Math.min(val+1,10); else val = Math.max(val-1,1); inp.value = val; };
            });
        }
        
        function renderQuickFiltered(filter = '') {
            const container = document.getElementById('quickListContainer');
            if (!container) return;
            const filtered = extraItemsList.filter(i => i.includes(filter));
            container.innerHTML = filtered.map((item, idx) => `<div class="modern-item-card"><div class="item-info"><input type="checkbox" id="quick_chk_${idx}"><span>${escapeHtml(item)}</span></div><div class="quantity-modern"><button class="qty-btn" data-idx="${idx}" data-dir="down">-</button><input type="number" id="quick_qty_${idx}" value="1" min="1" max="10" class="qty-value"><button class="qty-btn" data-idx="${idx}" data-dir="up">+</button><span>kg</span></div></div>`).join('');
            document.querySelectorAll('#quickListContainer .qty-btn').forEach(btn => {
                btn.onclick = (e) => { let idx = btn.dataset.idx; let inp = document.getElementById(`quick_qty_${idx}`); let val = parseInt(inp.value); if(btn.dataset.dir === 'up') val = Math.min(val+1,10); else val = Math.max(val-1,1); inp.value = val; };
            });
        }
        
        function renderBags() {
            const container = document.getElementById('bagsListContainer');
            if (!container) return;
            container.innerHTML = bagTypesList.map((b, i) => `<div class="modern-item-card"><div class="item-info"><input type="checkbox" id="bag_chk_${i}"><span>${escapeHtml(b)}</span></div></div>`).join('');
        }
        
        // ==================== ربط الأزرار ====================
        document.getElementById('importantProductsBtn').onclick = () => { renderImportantFiltered(''); document.getElementById('importantModal').classList.add('active'); };
        document.getElementById('spicesExtraBtn').onclick = () => { renderSpicesExtraFiltered(''); document.getElementById('spicesExtraModal').classList.add('active'); };
        document.getElementById('quickProductsBtn').onclick = () => { renderQuickFiltered(''); document.getElementById('quickModal').classList.add('active'); };
        document.getElementById('bagsManagerBtn').onclick = () => { renderBags(); document.getElementById('bagsModal').classList.add('active'); };
        document.getElementById('tawsayaQuickBtn').onclick = () => { document.getElementById('tawsayaModal').classList.add('active'); };
        document.getElementById('manageDataBtn').onclick = () => { window.location.href = 'manage-data.html'; };
        document.getElementById('manageUnitsBtn').onclick = () => { window.location.href = 'manage-units.html'; };
        document.getElementById('refreshDataBtn').onclick = () => { showToast('✓ تم تحديث البيانات'); };
        document.getElementById('mainAddBtn').onclick = () => { document.getElementById('newItemModal').classList.add('active'); };
        document.getElementById('closeNewModalBtn').onclick = () => { document.getElementById('newItemModal').classList.remove('active'); };
        document.getElementById('closeImportantModalBtn').onclick = () => { document.getElementById('importantModal').classList.remove('active'); };
        document.getElementById('closeSpicesExtraModalBtn').onclick = () => { document.getElementById('spicesExtraModal').classList.remove('active'); };
        document.getElementById('closeQuickModalBtn').onclick = () => { document.getElementById('quickModal').classList.remove('active'); };
        document.getElementById('closeBagsModalBtn').onclick = () => { document.getElementById('bagsModal').classList.remove('active'); };
        document.getElementById('closeTawsayaModalBtn').onclick = () => { document.getElementById('tawsayaModal').classList.remove('active'); };
        document.getElementById('closeEditModalBtn').onclick = () => { document.getElementById('editModal').classList.remove('active'); };
        document.getElementById('themeToggle').onclick = () => { document.body.classList.toggle('dark'); };
        
        // إضافة رسالة تأكيد في وحدة التحكم
        console.log('✅ جميع الأزرار تم ربطها بنجاح');
        
        // إخفاء شاشة البداية
        setTimeout(() => {
            document.getElementById('splashScreen').classList.add('hidden');
            setTimeout(() => { document.getElementById('splashScreen').style.display = 'none'; }, 500);
        }, 2000);
    </script>
