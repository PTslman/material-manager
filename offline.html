<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | مدير المواد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #047857, #065f46);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            max-width: 350px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .icon {
            width: 80px; height: 80px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }
        .icon i { font-size: 40px; color: #059669; }
        h1 { font-size: 24px; color: #1f2937; margin-bottom: 12px; }
        p { color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
        button {
            background: #059669;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #047857; transform: translateY(-2px); }
        .tip {
            background: #fef3c7;
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
        }
        .tip i { color: #f59e0b; margin-left: 8px; }
        .tip p { margin: 0; color: #92400e; font-size: 14px; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-wifi-slash"></i></div>
        <h1>⚠️ غير متصل بالإنترنت</h1>
        <p>لا يوجد اتصال بالإنترنت.<br>سيتم حفظ التغييرات محلياً ومزامنتها تلقائياً عند عودة الاتصال.</p>
        <button onclick="location.reload()"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button>
        <div class="tip">
            <i class="fas fa-lightbulb"></i>
            <p>💡 التطبيق يعمل دون اتصال - جميع التغييرات محفوظة</p>
        </div>
    </div>
    <script>
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
