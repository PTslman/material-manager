<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - مدير المواد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', system-ui, sans-serif;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .offline-container { text-align: center; padding: 2rem; max-width: 400px; }
        .offline-icon { font-size: 5rem; margin-bottom: 1rem; animation: pulse 2s infinite; }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        p { color: #e8f5e9; margin-bottom: 2rem; line-height: 1.6; }
        .retry-btn {
            background: white; color: #2e7d32; border: none;
            padding: 12px 30px; border-radius: 60px; font-size: 1rem;
            font-weight: 600; cursor: pointer;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .info { margin-top: 2rem; font-size: 0.8rem; opacity: 0.8; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>يرجى التحقق من اتصالك بالشبكة والمحاولة مرة أخرى</p>
        <button class="retry-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button>
        <div class="info"><i class="fas fa-info-circle"></i> سيتم تحديث البيانات تلقائياً عند عودة الاتصال</div>
    </div>
</body>
</html>
