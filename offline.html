<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | مدير المواد</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#047857,#065f46);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:32px;padding:40px 24px;text-align:center;max-width:350px}
        .icon{width:80px;height:80px;background:#ecfdf5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
        .icon i{font-size:40px;color:#059669}
        h1{font-size:24px;color:#1f2937;margin-bottom:12px}
        p{color:#6b7280;margin-bottom:24px}
        button{background:#059669;color:white;border:none;padding:12px 24px;border-radius:999px;font-size:16px;cursor:pointer}
        button:hover{background:#047857}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-wifi-slash"></i></div>
        <h1>⚠️ غير متصل</h1>
        <p>لا يوجد اتصال بالإنترنت.<br>سيتم المزامنة تلقائياً عند عودة الاتصال.</p>
        <button onclick="location.reload()"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button>
    </div>
    <script>window.addEventListener('online',function(){location.reload();});</script>
</body>
</html>
