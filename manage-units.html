<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة وحدات القياس - مدير المواد</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: #fef9e6;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #2e7d32;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .units-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .unit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #fef9e6;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 12px;
        }
        .unit-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .unit-icon {
            width: 40px;
            height: 40px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2e7d32;
        }
        .unit-details { flex: 1; }
        .unit-name { font-weight: 700; }
        .unit-value { font-size: 0.7rem; color: #6b7280; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .toggle-slider {
            background-color: #2e7d32;
        }
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        .radio-select {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            cursor: pointer;
        }
        .radio-select.active {
            background: #2e7d32;
            border-color: #2e7d32;
            box-shadow: inset 0 0 0 3px white;
        }
        .action-btns { display: flex; gap: 8px; }
        .edit-unit, .delete-unit {
            background: none;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
        }
        .edit-unit { color: #f59e0b; }
        .edit-unit:hover { background: #fef3c7; }
        .delete-unit { color: #ef4444; }
        .delete-unit:hover { background: #fee2e2; }
        .add-unit-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            border-radius: 24px;
        }
        .modal-content h3 { margin-bottom: 20px; color: #2e7d32; }
        .modal-field { margin-bottom: 20px; }
        .modal-field label {
            display: block;
            font-weight: 600;
            font-size: 0.7rem;
            margin-bottom: 6px;
            color: #6b7280;
        }
        .modal-field input, .modal-field select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 40px;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .save-btn { background: #2e7d32; color: white; border: none; }
        .cancel-btn { background: #f3f4f6; border: 1px solid #e5e7eb; }
        .preview-units {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .preview-unit {
            background: #e8f5e9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #2e7d32; }
        .stat-label { font-size: 0.7rem; color: #6b7280; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .unit-item { flex-direction: column; align-items: stretch; }
            .action-btns { justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-ruler-combined"></i> إدارة وحدات القياس</h1>
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i> العودة</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalUnits">0</div><div class="stat-label">إجمالي الوحدات</div></div>
        <div class="stat-card"><div class="stat-number" id="activeUnits">0</div><div class="stat-label">الوحدات المفعلة</div></div>
        <div class="stat-card"><div class="stat-number" id="defaultUnitName">كيلو</div><div class="stat-label">الوحدة الافتراضية</div></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2><i class="fas fa-cog"></i> الوحدات الأساسية</h2>
        </div>
        <div id="basicUnits" class="units-list"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2><i class="fas fa-plus-circle"></i> الوحدات المخصصة</h2>
            <button class="add-unit-btn" id="addUnitBtn"><i class="fas fa-plus"></i> إضافة وحدة</button>
        </div>
        <div id="customUnits" class="units-list"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-eye"></i> معاينة الوحدات</h2>
        <div id="previewUnits" class="preview-units"></div>
    </div>

    <div id="unitModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"><i class="fas fa-plus"></i> إضافة وحدة</h3>
            <div class="modal-field"><label>اسم الوحدة</label><input type="text" id="unitName" placeholder="مثال: لتر، كيس، علبة"></div>
            <div class="modal-field"><label>القيمة (بالكيلوغرام)</label><input type="number" id="unitValue" step="0.01" placeholder="مثال: 0.5 = نصف كيلو"></div>
            <div class="modal-field"><label>الأيقونة</label><select id="unitIcon"><option value="fa-weight-hanging">⚖️ ميزان</option><option value="fa-box">📦 صندوق</option><option value="fa-cube">🧊 مكعب</option><option value="fa-bag-shopping">🛍️ كيس</option></select></div>
            <div class="modal-buttons"><button id="saveUnitBtn" class="save-btn">حفظ</button><button id="cancelUnitBtn" class="cancel-btn">إلغاء</button></div>
        </div>
    </div>

    <script>
        let unitsConfig = {
            kg: { name: 'كيلو', icon: 'fa-weight-hanging', enabled: true, value: 1 },
            half: { name: 'نصف كيلو', icon: 'fa-balance-scale', enabled: true, value: 0.5 },
            quarter: { name: 'ربع كيلو', icon: 'fa-chart-pie', enabled: true, value: 0.25 },
            oke: { name: 'لوقية', icon: 'fa-gem', enabled: true, value: 0.2 }
        };
        let customUnits = [];
        let defaultUnit = 'kg';
        let editingUnitId = null;

        function loadData() {
            const saved = localStorage.getItem('units_config');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.unitsConfig) {
                        Object.keys(data.unitsConfig).forEach(key => {
                            if (unitsConfig[key]) {
                                unitsConfig[key].enabled = data.unitsConfig[key].enabled;
                                if (data.unitsConfig[key].name) unitsConfig[key].name = data.unitsConfig[key].name;
                                if (data.unitsConfig[key].icon) unitsConfig[key].icon = data.unitsConfig[key].icon;
                            }
                        });
                    }
                    if (data.customUnits) customUnits = data.customUnits;
                    if (data.defaultUnit) defaultUnit = data.defaultUnit;
                } catch(e) {}
            }
        }

        function saveData() {
            const configToSave = {};
            Object.keys(unitsConfig).forEach(key => {
                configToSave[key] = {
                    name: unitsConfig[key].name,
                    icon: unitsConfig[key].icon,
                    enabled: unitsConfig[key].enabled,
                    value: unitsConfig[key].value
                };
            });
            localStorage.setItem('units_config', JSON.stringify({
                unitsConfig: configToSave,
                customUnits: customUnits,
                defaultUnit: defaultUnit
            }));
            updateStats();
        }

        function renderBasicUnits() {
            const container = document.getElementById('basicUnits');
            container.innerHTML = '';
            const order = ['kg', 'half', 'quarter', 'oke'];
            order.forEach(id => {
                const unit = unitsConfig[id];
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.innerHTML = `
                    <div class="unit-info">
                        <div class="unit-icon"><i class="fas ${unit.icon}"></i></div>
                        <div class="unit-details"><div class="unit-name">${unit.name}</div><div class="unit-value">${unit.value} كجم</div></div>
                    </div>
                    <label class="toggle-switch"><input type="checkbox" class="unit-toggle" data-id="${id}" ${unit.enabled ? 'checked' : ''}><span class="toggle-slider"></span></label>
                    <div class="radio-select ${defaultUnit === id ? 'active' : ''}" data-id="${id}" data-default></div>
                    <div class="action-btns"><button class="edit-unit" data-id="${id}" data-edit><i class="fas fa-edit"></i></button></div>
                `;
                container.appendChild(div);
            });
            
            document.querySelectorAll('.unit-toggle').forEach(toggle => {
                toggle.addEventListener('change', (e) => {
                    const id = toggle.dataset.id;
                    unitsConfig[id].enabled = toggle.checked;
                    saveData();
                    renderBasicUnits();
                    renderCustomUnits();
                    renderPreview();
                });
            });
            
            document.querySelectorAll('[data-default]').forEach(radio => {
                radio.addEventListener('click', () => {
                    const id = radio.dataset.id;
                    defaultUnit = id;
                    saveData();
                    renderBasicUnits();
                    renderCustomUnits();
                    renderPreview();
                });
            });
            
            document.querySelectorAll('[data-edit]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    editingUnitId = id;
                    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل الوحدة';
                    document.getElementById('unitName').value = unitsConfig[id].name;
                    document.getElementById('unitValue').value = unitsConfig[id].value;
                    document.getElementById('unitIcon').value = unitsConfig[id].icon;
                    document.getElementById('unitModal').classList.add('active');
                });
            });
        }

        function renderCustomUnits() {
            const container = document.getElementById('customUnits');
            if (customUnits.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af"><i class="fas fa-inbox"></i><p>لا توجد وحدات مخصصة</p></div>';
                return;
            }
            container.innerHTML = '';
            customUnits.forEach((unit, idx) => {
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.innerHTML = `
                    <div class="unit-info">
                        <div class="unit-icon"><i class="fas ${unit.icon || 'fa-cube'}"></i></div>
                        <div class="unit-details"><div class="unit-name">${unit.name}</div><div class="unit-value">${unit.value} كجم</div></div>
                    </div>
                    <label class="toggle-switch"><input type="checkbox" class="custom-toggle" data-idx="${idx}" ${unit.enabled !== false ? 'checked' : ''}><span class="toggle-slider"></span></label>
                    <div class="radio-select ${defaultUnit === unit.id ? 'active' : ''}" data-id="${unit.id}" data-default-custom></div>
                    <div class="action-btns"><button class="edit-unit" data-idx="${idx}" data-edit-custom><i class="fas fa-edit"></i></button><button class="delete-unit" data-idx="${idx}" data-delete-custom><i class="fas fa-trash-alt"></i></button></div>
                `;
                container.appendChild(div);
            });
            
            document.querySelectorAll('.custom-toggle').forEach(toggle => {
                toggle.addEventListener('change', (e) => {
                    const idx = parseInt(toggle.dataset.idx);
                    customUnits[idx].enabled = toggle.checked;
                    saveData();
                    renderCustomUnits();
                    renderPreview();
                });
            });
            
            document.querySelectorAll('[data-default-custom]').forEach(radio => {
                radio.addEventListener('click', () => {
                    const id = radio.dataset.id;
                    defaultUnit = id;
                    saveData();
                    renderBasicUnits();
                    renderCustomUnits();
                    renderPreview();
                });
            });
            
            document.querySelectorAll('[data-edit-custom]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    const unit = customUnits[idx];
                    editingUnitId = unit.id;
                    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل الوحدة';
                    document.getElementById('unitName').value = unit.name;
                    document.getElementById('unitValue').value = unit.value;
                    document.getElementById('unitIcon').value = unit.icon || 'fa-cube';
                    document.getElementById('unitModal').classList.add('active');
                });
            });
            
            document.querySelectorAll('[data-delete-custom]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (confirm(`هل أنت متأكد من حذف "${customUnits[idx].name}"؟`)) {
                        const deletedId = customUnits[idx].id;
                        customUnits.splice(idx, 1);
                        if (defaultUnit === deletedId) defaultUnit = 'kg';
                        saveData();
                        renderCustomUnits();
                        renderBasicUnits();
                        renderPreview();
                    }
                });
            });
        }

        function renderPreview() {
            const container = document.getElementById('previewUnits');
            container.innerHTML = '';
            const order = ['kg', 'half', 'quarter', 'oke'];
            order.forEach(id => {
                if (unitsConfig[id].enabled) {
                    const span = document.createElement('span');
                    span.className = 'preview-unit';
                    span.innerHTML = `<i class="fas ${unitsConfig[id].icon}"></i> ${unitsConfig[id].name}`;
                    container.appendChild(span);
                }
            });
            customUnits.forEach(unit => {
                if (unit.enabled !== false) {
                    const span = document.createElement('span');
                    span.className = 'preview-unit';
                    span.innerHTML = `<i class="fas ${unit.icon || 'fa-cube'}"></i> ${unit.name}`;
                    container.appendChild(span);
                }
            });
        }

        function updateStats() {
            const total = Object.keys(unitsConfig).length + customUnits.length;
            const active = Object.values(unitsConfig).filter(u => u.enabled).length + customUnits.filter(u => u.enabled !== false).length;
            document.getElementById('totalUnits').textContent = total;
            document.getElementById('activeUnits').textContent = active;
            const defaultObj = unitsConfig[defaultUnit] || customUnits.find(u => u.id === defaultUnit);
            document.getElementById('defaultUnitName').textContent = defaultObj?.name || 'كيلو';
        }

        function addCustomUnit() {
            const name = document.getElementById('unitName').value.trim();
            const value = parseFloat(document.getElementById('unitValue').value);
            const icon = document.getElementById('unitIcon').value;
            if (!name) { alert('الرجاء إدخال اسم الوحدة'); return; }
            if (isNaN(value) || value <= 0) { alert('الرجاء إدخال قيمة صحيحة'); return; }
            customUnits.push({ id: `custom_${Date.now()}`, name, value, icon, enabled: true });
            saveData();
            renderCustomUnits();
            renderPreview();
        }

        function updateUnit() {
            const name = document.getElementById('unitName').value.trim();
            const value = parseFloat(document.getElementById('unitValue').value);
            const icon = document.getElementById('unitIcon').value;
            if (!name) { alert('الرجاء إدخال اسم الوحدة'); return; }
            if (isNaN(value) || value <= 0) { alert('الرجاء إدخال قيمة صحيحة'); return; }
            if (unitsConfig[editingUnitId]) {
                unitsConfig[editingUnitId].name = name;
                unitsConfig[editingUnitId].value = value;
                unitsConfig[editingUnitId].icon = icon;
            } else {
                const idx = customUnits.findIndex(u => u.id === editingUnitId);
                if (idx !== -1) {
                    customUnits[idx].name = name;
                    customUnits[idx].value = value;
                    customUnits[idx].icon = icon;
                }
            }
            saveData();
            renderBasicUnits();
            renderCustomUnits();
            renderPreview();
        }

        document.getElementById('addUnitBtn').onclick = () => {
            editingUnitId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> إضافة وحدة جديدة';
            document.getElementById('unitName').value = '';
            document.getElementById('unitValue').value = '';
            document.getElementById('unitIcon').value = 'fa-cube';
            document.getElementById('unitModal').classList.add('active');
        };
        document.getElementById('saveUnitBtn').onclick = () => {
            if (editingUnitId) updateUnit();
            else addCustomUnit();
            document.getElementById('unitModal').classList.remove('active');
        };
        document.getElementById('cancelUnitBtn').onclick = () => document.getElementById('unitModal').classList.remove('active');
        document.getElementById('unitModal').onclick = (e) => { if (e.target === document.getElementById('unitModal')) document.getElementById('unitModal').classList.remove('active'); };

        loadData();
        renderBasicUnits();
        renderCustomUnits();
        renderPreview();
        updateStats();
    </script>
</body>
</html>
